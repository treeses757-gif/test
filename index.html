<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Танковая дуэль</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #lobby {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
        }
        #lobby input, #lobby button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
        }
        #game {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #2a6f2a;
            position: relative;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #3a7e3a;
        }
        #roomInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        #playersList {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>Танковая дуэль</h1>
        <button onclick="createRoom()">Создать комнату</button>
        <br>
        <input id="roomCodeInput" type="text" placeholder="Код комнаты" maxlength="6">
        <button onclick="joinRoomFromInput()">Присоединиться</button>
        <div id="playersList"></div>
    </div>

    <div id="game">
        <canvas id="gameCanvas"></canvas>
        <div id="roomInfo">Комната: <span id="roomCodeSpan"></span></div>
    </div>

    <script type="module">
        // ----- Импорты Firebase -----
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, update, onValue, get, remove } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        // ----- Конфигурация Firebase -----
        const firebaseConfig = {
            apiKey: "AIzaSyC-iLxizH1umfeHSUZHLvpAt6XNm21p90Y",
            authDomain: "tanksduel-b90c7.firebaseapp.com",
            projectId: "tanksduel-b90c7",
            storageBucket: "tanksduel-b90c7.firebasestorage.app",
            messagingSenderId: "952596856224",
            appId: "1:952596856224:web:aefd98cf1d768e9169f8c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // ----- Глобальные переменные -----
        let currentPlayerId = null;
        let currentRoomCode = null;
        let roomListener = null;
        let gameStateListener = null;
        let players = {};
        let isHost = false;
        let gameActive = false;

        // Данные игры (локальные)
        let canvas, ctx;
        let tankImage = new Image();
        tankImage.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40"><rect x="5" y="15" width="30" height="10" fill="green"/><rect x="15" y="5" width="10" height="20" fill="darkgreen"/><circle cx="20" cy="25" r="8" fill="darkgreen"/><rect x="35" y="17" width="15" height="6" fill="brown"/></svg>';
        let enemyTankImage = new Image();
        enemyTankImage.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40"><rect x="5" y="15" width="30" height="10" fill="red"/><rect x="15" y="5" width="10" height="20" fill="darkred"/><circle cx="20" cy="25" r="8" fill="darkred"/><rect x="35" y="17" width="15" height="6" fill="brown"/></svg>';

        // Позиции танков
        let myTank = { x: 200, y: 200, angle: 0 };
        let enemyTank = { x: 600, y: 200, angle: Math.PI };

        // ----- Авторизация -----
        signInAnonymously(auth).then((userCredential) => {
            currentPlayerId = userCredential.user.uid;
            console.log('Игрок авторизован:', currentPlayerId);
        }).catch(console.error);

        // ----- Вспомогательные функции -----
        function generateRoomCode() {
            return Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        // Создание комнаты
        window.createRoom = async function() {
            if (!currentPlayerId) {
                alert('Подождите, идёт авторизация...');
                return;
            }
            const roomCode = generateRoomCode();
            const roomRef = ref(db, `rooms/${roomCode}`);
            
            // Проверяем, не занят ли код
            const snapshot = await get(roomRef);
            if (snapshot.exists()) {
                return createRoom(); // пробуем другой
            }

            const playerData = {
                id: currentPlayerId,
                name: `Игрок ${currentPlayerId.slice(0,4)}`,
                ready: false
            };

            await set(roomRef, {
                players: {
                    [currentPlayerId]: playerData
                },
                gameState: null
            });

            currentRoomCode = roomCode;
            isHost = true; // создатель - хост
            listenRoom(roomCode);
            document.getElementById('roomCodeSpan').textContent = roomCode;
            // Не показываем игру сразу, ждём второго игрока
        };

        // Присоединение к комнате (по полю ввода)
        window.joinRoomFromInput = async function() {
            if (!currentPlayerId) {
                alert('Подождите, идёт авторизация...');
                return;
            }
            const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!roomCode) return;
            await joinRoom(roomCode);
        };

        async function joinRoom(roomCode) {
            const roomRef = ref(db, `rooms/${roomCode}`);
            const snapshot = await get(roomRef);
            
            if (!snapshot.exists()) {
                alert('Комната не найдена');
                return false;
            }

            const roomData = snapshot.val();
            const playersData = roomData.players || {};
            
            if (Object.keys(playersData).length >= 2) {
                alert('Комната уже заполнена');
                return false;
            }

            const playerData = {
                id: currentPlayerId,
                name: `Игрок ${currentPlayerId.slice(0,4)}`,
                ready: false
            };

            await update(ref(db, `rooms/${roomCode}/players`), {
                [currentPlayerId]: playerData
            });

            currentRoomCode = roomCode;
            isHost = false;
            listenRoom(roomCode);
            document.getElementById('roomCodeSpan').textContent = roomCode;
            return true;
        }

        // Слушаем изменения в комнате
        function listenRoom(roomCode) {
            const roomRef = ref(db, `rooms/${roomCode}`);
            
            if (roomListener) {
                roomListener();
            }
            
            roomListener = onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    // Комната удалена
                    leaveRoom();
                    return;
                }
                
                players = data.players || {};
                const playerCount = Object.keys(players).length;
                
                // Обновляем интерфейс лобби
                updateLobbyUI(roomCode, players, playerCount);
                
                // Если в комнате два игрока и игра ещё не началась (gameState = null)
                if (playerCount === 2 && data.gameState === null) {
                    startGame(roomCode, players, isHost);
                }
                
                // Если игра уже идёт, но мы только что подключились и gameState уже есть
                if (playerCount === 2 && data.gameState !== null && !gameActive) {
                    // Уже идёт игра, просто показываем поле
                    showGameScreen(roomCode);
                    listenGameState(roomCode);
                }
            });
        }

        function updateLobbyUI(roomCode, players, playerCount) {
            const listDiv = document.getElementById('playersList');
            let html = '<h3>Игроки в комнате:</h3>';
            for (let id in players) {
                html += `<p>${players[id].name} ${id === currentPlayerId ? '(вы)' : ''}</p>`;
            }
            if (playerCount < 2) {
                html += '<p>Ожидание второго игрока...</p>';
            } else {
                html += '<p>Оба игрока на месте! Игра начинается...</p>';
            }
            listDiv.innerHTML = html;
        }

        function startGame(roomCode, players, isHost) {
            if (isHost) {
                // Хост инициализирует игровое состояние
                const playerIds = Object.keys(players);
                const gameState = {
                    turn: playerIds[0], // ход первого игрока (хоста)
                    tanks: {
                        [playerIds[0]]: { x: 200, y: 200, angle: 0 },
                        [playerIds[1]]: { x: 600, y: 200, angle: Math.PI }
                    }
                };
                set(ref(db, `rooms/${roomCode}/gameState`), gameState);
            }
            
            // Показываем экран игры
            showGameScreen(roomCode);
            listenGameState(roomCode);
        }

        function showGameScreen(roomCode) {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            gameActive = true;
            
            // Инициализация canvas
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Запуск игрового цикла
            requestAnimationFrame(gameLoop);
        }

        function listenGameState(roomCode) {
            const gameStateRef = ref(db, `rooms/${roomCode}/gameState`);
            if (gameStateListener) gameStateListener();
            
            gameStateListener = onValue(gameStateRef, (snapshot) => {
                const state = snapshot.val();
                if (!state || !state.tanks) return;
                
                // Обновляем позиции врага
                if (currentPlayerId) {
                    for (let id in state.tanks) {
                        if (id !== currentPlayerId) {
                            // Это враг
                            enemyTank = state.tanks[id];
                        } else {
                            // Наш танк (но локально мы управляем своим, поэтому не перезаписываем, если не хотим)
                            // Можно обновлять, если нужна синхронизация от хоста, но мы хотим локальное управление,
                            // поэтому оставляем локальный myTank. Однако, если другой игрок изменил что-то (например, поворот),
                            // мы должны это учесть? В простейшем случае каждый управляет своим, поэтому обновлять не нужно.
                            // Но если хост меняет позиции обоих, то нужно.
                            // Для упрощения: хост не меняет позицию другого, каждый сам отправляет свою позицию.
                        }
                    }
                }
            });
        }

        // Игровой цикл (отрисовка)
        function gameLoop() {
            if (!gameActive) return;
            update(); // обработка ввода
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Обработка клавиш
        let keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function update() {
            if (!gameActive || !currentRoomCode || !currentPlayerId) return;

            // Управление своим танком
            const speed = 3;
            if (keys['ArrowUp']) {
                myTank.y -= speed;
            }
            if (keys['ArrowDown']) {
                myTank.y += speed;
            }
            if (keys['ArrowLeft']) {
                myTank.x -= speed;
            }
            if (keys['ArrowRight']) {
                myTank.x += speed;
            }
            // Поворот (условно)
            // Для простоты будем считать, что танк поворачивается к мыши или куда-то
            // Но пока оставим без поворота

            // Отправляем свою позицию в Firebase
            const updates = {};
            updates[`rooms/${currentRoomCode}/gameState/tanks/${currentPlayerId}`] = myTank;
            update(ref(db), updates).catch(console.error);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Рисуем препятствия (просто для примера)
            ctx.fillStyle = '#5a3e1a';
            ctx.fillRect(300, 150, 50, 200);
            ctx.fillRect(500, 100, 100, 50);
            
            // Рисуем вражеский танк
            if (enemyTankImage.complete) {
                ctx.save();
                ctx.translate(enemyTank.x, enemyTank.y);
                ctx.rotate(enemyTank.angle);
                ctx.drawImage(enemyTankImage, -20, -20, 40, 40);
                ctx.restore();
            }
            
            // Рисуем свой танк
            if (tankImage.complete) {
                ctx.save();
                ctx.translate(myTank.x, myTank.y);
                ctx.rotate(myTank.angle);
                ctx.drawImage(tankImage, -20, -20, 40, 40);
                ctx.restore();
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // Выход из комнаты (если закрываем вкладку)
        window.addEventListener('beforeunload', () => {
            if (currentPlayerId && currentRoomCode) {
                remove(ref(db, `rooms/${currentRoomCode}/players/${currentPlayerId}`));
            }
        });

        // Функция для ручного выхода (можно добавить кнопку)
        window.leaveRoom = function() {
            if (currentPlayerId && currentRoomCode) {
                remove(ref(db, `rooms/${currentRoomCode}/players/${currentPlayerId}`));
                currentRoomCode = null;
                gameActive = false;
                document.getElementById('lobby').style.display = 'block';
                document.getElementById('game').style.display = 'none';
                if (roomListener) roomListener();
                if (gameStateListener) gameStateListener();
            }
        };

        // Удаление комнаты, если игрок был последним (проверяем при отписке)
        // Для простоты оставим так.

        console.log('Модуль загружен');
    </script>
</body>
</html>
